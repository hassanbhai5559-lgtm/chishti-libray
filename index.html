<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Nu4dgdg7ZoLzYKrhOL0UbRmrjxaXVEm47raDJnEYeFQ">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chishti Library Books Center</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        /* HEADER */
        .header {
            text-align: center;
            background: #0f5132;
            color: white;
            padding-bottom: 30px;
        }

        .banner {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .logo-wrapper {
            margin-top: -60px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            background: white;
            object-fit: cover;
        }

        .header h1 {
            margin: 10px 0 5px;
        }

        .header p {
            opacity: 0.9;
        }

        /* SEARCH */
        .search {
            text-align: center;
            margin: 20px;
        }

        .search input {
            width: 80%;
            max-width: 600px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
        }

        /* CONTAINER */
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        /* BOOK */
        .book {
            background: white;
            width: 280px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .book-cover {
            width: 180px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #0f5132;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #146c43;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: #0f5132;
            color: white;
            margin-top: auto;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .book {
                width: 90%;
            }

            .search input {
                width: 95%;
            }
        }
    </style>
</head>

<body>

<!-- HEADER WITH LOGO -->
<header class="header">

    <!-- BANNER -->
    <img src="banner.jpg" alt="Banner" class="banner">

    <!-- LOGO -->
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <h1>Chishti Library</h1>
    <p>Islamic Books & Reading Center</p>

</header>

<!-- SEARCH -->
<div class="search">
    <input type="text" placeholder="Search books...">
</div>

<!-- BOOKS -->
<div class="container">

    <div class="book">
        <img src="image.png" alt="Book Cover" class="book-cover">
        <h3>Shahdaye Karbala</h3>
        <a href="shahdaye-karbala-4.html" class="btn">Read Book</a>
    </div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 Chishti Library
</footer>

</body>
</html>
